# TYPO3 backend routing for nginx (live server)
# Include inside the server { } block for artmedia.gallery.
# Docroot must point to the project's public/ directory.

location = /typo3 {
    return 301 /typo3/;
}

location /typo3/ {
    try_files $uri /typo3/index.php$is_args$args;
}

location / {
    try_files $uri $uri/ /index.php$is_args$args;
}

location ~ \.php$ {
    try_files $uri =404;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
}
